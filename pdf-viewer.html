<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f36b21">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FUJI '26">
  <link rel="apple-touch-icon" href="assets/icon-180.png">
  <link rel="icon" type="image/png" href="assets/icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Timetable Preview</title>
  <style>
    :root{--bg:#f7f5ef;--paper:#fffef9;--ink:#151515;--muted:#67625b;--line:#ded8cc;--orange:#f36b21;--shadow:0 16px 36px rgba(35,28,20,.12)}
    *{box-sizing:border-box}
    html{background:var(--bg)}
    body{margin:0;background:linear-gradient(180deg,rgba(243,107,33,.09),transparent 280px),var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,"Hiragino Sans","Yu Gothic",sans-serif}
    .topbar{position:sticky;top:0;z-index:20;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;background:rgba(255,254,249,.94);-webkit-backdrop-filter:saturate(1.35) blur(14px);backdrop-filter:saturate(1.35) blur(14px);border-bottom:1px solid var(--line);box-shadow:0 6px 20px rgba(35,28,20,.1)}
    .topbar-inner{width:min(1500px,100%);margin:0 auto;display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:12px;align-items:center}
    .back,.pdf-action{display:inline-flex;align-items:center;justify-content:center;min-height:44px;border-radius:999px;padding:10px 15px;text-decoration:none;font-size:13px;font-weight:1000;white-space:nowrap}
    .back{background:#ece7dd;color:#111}.pdf-action{background:#111;color:#fff}
    .title{text-align:center;min-width:0}.title h1{margin:0;font-size:clamp(18px,3.5vw,30px);line-height:1.05;letter-spacing:-.035em}.title p{margin:4px 0 0;color:var(--muted);font-size:11px;font-weight:700;line-height:1.35}
    main{width:min(1500px,100%);margin:0 auto;padding:16px 14px 38px}
    .preview-list{display:grid;gap:18px}
    .preview-card{overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
    .day-label{padding:10px 14px;color:#fff;font-size:14px;font-weight:1000;letter-spacing:.08em}
    .day-label.fri{background:linear-gradient(90deg,#f36b21,#ff8a4b)}
    .day-label.sat{background:linear-gradient(90deg,#2387c8,#49aee8)}
    .day-label.sun{background:linear-gradient(90deg,#e83f32,#ff6b4a)}
    .preview-card img{display:block;width:100%;height:auto;background:#fff}
    .hint{margin:16px auto 0;max-width:760px;color:var(--muted);text-align:center;font-size:12px;line-height:1.65;font-weight:650}
    @media(max-width:680px){
      .topbar{padding-left:8px;padding-right:8px}
      .topbar-inner{grid-template-columns:auto minmax(0,1fr) auto;gap:6px}
      .back,.pdf-action{min-height:40px;padding:8px 10px;font-size:11px}
      .title h1{font-size:15px}.title p{display:none}
      main{padding:10px 8px calc(24px + env(safe-area-inset-bottom))}
      .preview-list{gap:12px}.preview-card{border-radius:12px}
    }
    @media(max-width:340px){.back span,.pdf-action span{display:none}.back,.pdf-action{width:42px;padding:8px;font-size:18px}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="back" id="backLink" href="index.html" aria-label="Back">← <span id="backText">戻る</span></a>
      <div class="title"><h1 id="viewerTitle">Timetable</h1><p id="viewerSub"></p></div>
      <a class="pdf-action" id="pdfLink" href="assets/3days.pdf" target="_blank" rel="noopener" aria-label="Open PDF"><span id="pdfText">PDFを開く</span> ↗</a>
    </div>
  </header>
  <main>
    <div class="preview-list" id="previewList" aria-live="polite"></div>
    <p class="hint" id="viewerHint"></p>
  </main>
  <script>
    (function(){
      var params=new URLSearchParams(location.search);
      var day=params.get('day')||'3days';
      var lang=params.get('lang')||'ja';
      if(!/^(24fri|25sat|26sun|3days)$/.test(day)) day='3days';
      if(!/^(ja|en|zh-tw)$/.test(lang)) lang='ja';

      var copy={
        ja:{back:'戻る',pdf:'PDFを開く／保存',sub:'アプリ内プレビュー',hint:'必要な場合だけ、右上のボタンから実際のPDFを別画面で開けます。',three:'3日間タイムテーブル',one:'{day} タイムテーブル'},
        en:{back:'Back',pdf:'Open / Save PDF',sub:'In-app preview',hint:'Use the button at the top right only when you want to open the actual PDF in a separate view.',three:'3-Day Timetable',one:'{day} Timetable'},
        'zh-tw':{back:'返回',pdf:'開啟／儲存 PDF',sub:'應用程式內預覽',hint:'只有需要時，才使用右上方按鈕在另一個畫面開啟 PDF。',three:'三日時間表',one:'{day} 時間表'}
      }[lang];
      var fallback=lang==='en'?'en/index.html':(lang==='zh-tw'?'zh-tw/index.html':'index.html');
      var days=day==='3days'?['24fri','25sat','26sun']:[day];
      var labels={"24fri":'24 FRI',"25sat":'25 SAT',"26sun":'26 SUN'};
      var classes={"24fri":'fri',"25sat":'sat',"26sun":'sun'};
      var title=day==='3days'?copy.three:copy.one.replace('{day}',labels[day]);

      document.documentElement.lang=lang==='zh-tw'?'zh-Hant-TW':lang;
      document.title=title+" / FUJI ROCK FESTIVAL '26";
      document.getElementById('viewerTitle').textContent=title;
      document.getElementById('viewerSub').textContent=copy.sub;
      document.getElementById('backText').textContent=copy.back;
      document.getElementById('pdfText').textContent=copy.pdf;
      document.getElementById('viewerHint').textContent=copy.hint;

      var back=document.getElementById('backLink');
      back.href=fallback;
      back.setAttribute('aria-label',copy.back);
      back.addEventListener('click',function(e){
        var sameOrigin=false;
        try{sameOrigin=!!document.referrer&&new URL(document.referrer).origin===location.origin;}catch(_e){}
        if(sameOrigin&&history.length>1){e.preventDefault();history.back();}
      });

      var pdf=document.getElementById('pdfLink');
      pdf.href='assets/'+day+'.pdf';
      pdf.setAttribute('aria-label',copy.pdf);

      var list=document.getElementById('previewList');
      days.forEach(function(d){
        var section=document.createElement('section');
        section.className='preview-card';
        section.innerHTML=(day==='3days'?'<div class="day-label '+classes[d]+'">'+labels[d]+'</div>':'')+'<img src="assets/'+d+'.png" alt="'+labels[d]+' timetable preview">';
        list.appendChild(section);
      });
    })();
  </script>
  <script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}</script>
</body>
</html>
