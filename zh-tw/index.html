<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f36b21">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FUJI '26">
  <link rel="apple-touch-icon" href="../assets/icon-180.png">
  <link rel="icon" type="image/png" href="../assets/icon-192.png">
  <link rel="manifest" href="../manifest.webmanifest">
  <title>FUJI ROCK FESTIVAL '26 時間表</title>
  <meta name="description" content="FUJI ROCK FESTIVAL '26 非官方 A4 橫向時間表 PDF。">
  <style>
    :root {
      --bg: #f7f5ef;
      --paper: #fffef9;
      --ink: #151515;
      --muted: #67625b;
      --line: #ded8cc;
      --orange: #f36b21;
      --orange2: #ff8a4b;
      --sunday-red: #e83f32;
      --sunday-red2: #ff6b4a;
      --dark: #141414;
      --shadow: 0 16px 36px rgba(35, 28, 20, .10);
      --green: #68a93a;
      --white-stage: #8b8b8b;
      --red: #f05a4a;
      --cyan: #55c3cf;
      --yellow: #f4a03a;
      --pink: #c84d80;
      --teal: #43b7ad;
      --olive: #a0a312;
      --blue: #356aa2;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body {
      margin: 0;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        linear-gradient(180deg, rgba(243,107,33,.08), transparent 260px),
        var(--bg);
      color: var(--ink);
    }
    a { color: inherit; }

    header {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 28px 18px 18px;
    }
    .inline-lang {
      display: block;
      margin-top: 6px;
      font-weight: 400;
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 0;
    }
    .inline-lang a {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 400;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      min-width: 0;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }
    h1 {
      margin: 0;
      max-width: 100%;
      font-size: clamp(32px, 6.1vw, 76px);
      line-height: .94;
      letter-spacing: -.065em;
      font-weight: 1000;
      white-space: nowrap;
    }
    .subtitle {
      margin: 12px 0 0;
      font-size: clamp(20px, 2.7vw, 38px);
      line-height: 1.08;
      letter-spacing: -.045em;
      font-weight: 1000;
    }
    .lead {
      margin: 12px 0 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
      font-weight: 650;
    }
    .stamp {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: #fff;
      border: 10px solid var(--orange);
      display: grid;
      place-items: center;
      text-align: center;
      box-shadow: var(--shadow);
      transform: rotate(-4deg);
      flex: 0 0 auto;
    }
    .stamp strong { display: block; font-size: 42px; line-height: .8; letter-spacing: -.06em; }
    .stamp span { display: block; margin-top: 8px; font-size: 12px; font-weight: 1000; color: var(--muted); letter-spacing: .06em; }

    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px 18px 46px;
    }
    section { scroll-margin-top: 18px; }
    .download {
      position: relative;
      overflow: hidden;
      background: var(--dark);
      color: #fff;
      border-radius: 22px;
      padding: 24px;
      margin: 0 0 20px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      box-shadow: var(--shadow);
    }
    .download::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 8px;
      background: linear-gradient(90deg, var(--green), var(--white-stage), var(--red), var(--cyan), var(--yellow), var(--pink), var(--teal), var(--olive), var(--blue));
    }
    .download h2 { margin: 0 0 8px; font-size: clamp(26px, 3.2vw, 42px); letter-spacing: -.05em; line-height: 1; }
    .download p { margin: 0; color: #ddd7cf; line-height: 1.65; font-weight: 700; }
    .download a {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 52px;
      padding: 13px 20px;
      border-radius: 999px;
      background: #fff;
      color: #111;
      text-decoration: none;
      font-weight: 1000;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(0,0,0,.24);
    }
    .download a:hover, .download a:focus-visible { outline: 3px solid rgba(255,255,255,.35); }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .card-head {
      color: #fff;
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 13px;
      font-weight: 1000;
      letter-spacing: .02em;
    }
    .card:nth-child(1) .card-head { background: linear-gradient(90deg, var(--orange) 0%, var(--orange2) 100%); }
    .card:nth-child(2) .card-head { background: linear-gradient(90deg, #2387c8 0%, #49aee8 100%); }
    .card:nth-child(3) .card-head { background: linear-gradient(90deg, var(--sunday-red) 0%, var(--sunday-red2) 100%); }
    .card-head small { font-size: 11px; opacity: .86; font-weight: 900; }
    .thumb {
      display: block;
      background: #fff;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }
    .thumb img {
      display: block;
      width: 100%;
      height: auto;
      transform: scale(1.01);
      transform-origin: top center;
    }
    .body { padding: 12px 14px 14px; }
    .card-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .card-actions.single { justify-content: flex-end; }
    .live-small {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--orange);
      color: #fff;
      text-decoration: none;
      font-weight: 1000;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
      box-shadow: 0 5px 12px rgba(243,107,33,.22);
    }
    .card:nth-child(2) .live-small { background: #2387c8; box-shadow: 0 5px 12px rgba(35,135,200,.22); }
    .card:nth-child(3) .live-small { background: var(--sunday-red); box-shadow: 0 5px 12px rgba(232,63,50,.22); }
    .live-small:hover, .live-small:focus-visible { outline: 3px solid rgba(243,107,33,.25); }

    footer {
      width: min(1180px, 100%);
      margin: 0 auto;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      padding: 0 18px 34px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .stamp { display: none; }
      h1 { font-size: clamp(34px, 10vw, 60px); }
      .grid { grid-template-columns: 1fr; }
      .download { grid-template-columns: 1fr; }
      .download a { width: 100%; }
    }
    @media (max-width: 560px) {
      header { padding: 18px 14px 14px; }
      main { padding: 14px 14px 36px; }
      h1 { font-size: clamp(20px, 6.4vw, 34px); line-height: 1; letter-spacing: -.055em; }
      .subtitle { font-size: clamp(17px, 5.2vw, 24px); letter-spacing: -.04em; }
      .lead { font-size: 13px; line-height: 1.65; }
    }
    @media (max-width: 360px) {
      h1 { font-size: clamp(19px, 6.1vw, 22px); letter-spacing: -.05em; }
      .subtitle { font-size: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="hero">
      <div>
        <h1>FUJI ROCK FESTIVAL '26</h1>
        <p class="subtitle">A4 橫向時間表</p>
        <p class="lead">這是個人製作的非官方 PDF，將每天的演出時間整理成 A4 橫向版面。09:00–29:00、每 10 分鐘一格，各舞台並列顯示。<br><span class="inline-lang"><a href="../" lang="ja">日本語</a> / <a href="../en/" lang="en">English</a></span></p>
      </div>
      <div class="stamp" aria-hidden="true"><div><strong>3</strong><span>DAYS PDF</span></div></div>
    </div>
  </header>

  <main>
    <section class="download" id="download" aria-label="三日總覽 PDF">
      <div>
        <h2>三日總覽 PDF</h2>
        <p>24 FRI / 25 SAT / 26 SUN 合併成一個 PDF。</p>
      </div>
      <a href="../pdf-viewer.html?day=3days&amp;lang=zh-tw">查看三日總覽</a>
    </section>

    <section class="grid" id="daily" aria-label="每日時間表">
      <article class="card">
        <div class="card-head"><span>24 FRI</span><small>PDF / CSV</small></div>
        <a class="thumb" href="24fri-live.html"><img src="../assets/24fri.png" alt="查看 24 FRI 時間表"></a>
        <div class="body"><div class="card-actions single"><a class="live-small" href="24fri-live.html">查看目前時間線</a></div></div>
      </article>

      <article class="card">
        <div class="card-head"><span>25 SAT</span><small>PDF / CSV</small></div>
        <a class="thumb" href="25sat-live.html"><img src="../assets/25sat.png" alt="查看 25 SAT 時間表"></a>
        <div class="body"><div class="card-actions single"><a class="live-small" href="25sat-live.html">查看目前時間線</a></div></div>
      </article>

      <article class="card">
        <div class="card-head"><span>26 SUN</span><small>PDF / CSV</small></div>
        <a class="thumb" href="26sun-live.html"><img src="../assets/26sun.png" alt="查看 26 SUN 時間表"></a>
        <div class="body"><div class="card-actions single"><a class="live-small" href="26sun-live.html">查看目前時間線</a></div></div>
      </article>
    </section>
  </main>

  <footer>
    <p>個人製作的非官方時間表。最新時間與變更請務必以官方公告為準。</p>
  </footer>

<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("../sw.js").catch(function(){});});}</script>
</body>
</html>
